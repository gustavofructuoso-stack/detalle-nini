<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galaxia Monumental 3D - TQM NINI por Guss</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        /* Título eliminado por petición */
    </style>
</head>
<body>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, particles, controls;
        // 100k partículas para alta densidad
        const particleCount = 100000; 
        const targetPositions = new Float32Array(particleCount * 3);

        // Textura para las estrellas (brillo radial)
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.7)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        // --- FUNCIÓN DE SAMPLING TEXTUAL ACTUALIZADA (AHORA TQM NINI Y GRANDE) ---
        function generateIntegratedTextTargets(text, count) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            // Alta resolución de canvas para muestreo fino
            canvas.width = 1600; 
            canvas.height = 400;
            
            ctx.fillStyle = 'white';
            // Fuente gruesa e impactante
            ctx.font = 'bold 180px Arial, sans-serif'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];
            // Muestreo fino
            for (let y = 0; y < canvas.height; y += 3) { 
                for (let x = 0; x < canvas.width; x += 3) {
                    const alpha = imageData[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        points.push({
                            x: (x - canvas.width / 2),
                            y: (canvas.height / 2 - y),
                        });
                    }
                }
            }

            // --- ESCALADO INTEGRADO GRANDE DENTRO DEL CORAZÓN ---
            // Tamaño objetivo grande para impacto visual
            const targetWidth = 260; 
            const targetHeight = 110; 

            const originalWidth = 1600; 
            const originalHeight = 400;

            const finalScale = Math.min(targetWidth / originalWidth, targetHeight / originalHeight) * 1.05;

            const targets = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                const p = points[Math.floor(Math.random() * points.length)];
                targets[i*3] = p.x * finalScale;
                targets[i*3+1] = p.y * finalScale;
                // Sutil profundidad 3D
                targets[i*3+2] = (Math.random() - 0.5) * 5.0; 
            }
            return targets;
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
            camera.position.z = 500; // Perspectiva para ver la escala monumental

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            // --- PARÁMETROS DE DISEÑO ---
            const heartScale = 12.0; // Escala monumental
            // 60% Marco del Corazón (Rosa), 40% Texto (Oro)
            const heartParticleCount = Math.floor(particleCount * 0.60);
            const textParticleCount = particleCount - heartParticleCount;

            // Generar destinos del texto integrados, grandes y actualizados (TQM NINI)
            const textTargets = generateIntegratedTextTargets("TQM NINI", textParticleCount);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // 1. CAOS INICIAL: Gran esfera de inicio
                const radiusStart = Math.random() * 600 + 200;
                const thetaStart = Math.random() * 2 * Math.PI;
                const phiStart = Math.acos((Math.random() * 2) - 1);
                
                positions[i3] = radiusStart * Math.sin(phiStart) * Math.cos(thetaStart);
                positions[i3 + 1] = radiusStart * Math.sin(phiStart) * Math.sin(thetaStart);
                positions[i3 + 2] = radiusStart * Math.cos(phiStart);

                // 2. DESTINOS
                const mixedColor = new THREE.Color();

                if (i < heartParticleCount) {
                    // --- Forma de Corazón Monumental Perfecta ---
                    const t = (i / heartParticleCount) * Math.PI * 2 * 35;
                    const tx = 16 * Math.pow(Math.sin(t), 3);
                    const ty = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - 0.7 * Math.cos(4*t);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const radiusTarget = Math.random() * 8 + (Math.sin(t * 5) * 4); 

                    targetPositions[i3] = tx * heartScale + (Math.cos(angle) * radiusTarget) * heartScale * 0.1;
                    targetPositions[i3 + 1] = ty * heartScale + (Math.sin(angle) * radiusTarget) * heartScale * 0.1;
                    targetPositions[i3 + 2] = (Math.random() - 0.5) * 30 + (Math.sin(t * 3) * 12); 

                    // Color Corazón: Rosas intensos y Purpuras Neón
                    const randomChoice = Math.random();
                    if (randomChoice < 0.75) mixedColor.setHSL(0.92 + Math.random() * 0.03, 1.0, 0.7);
                    else mixedColor.setHSL(0.85, 1.0, 0.85); 
                } else {
                    // --- Texto TQM NINI Grande Integrado ---
                    const textIdx = (i - heartParticleCount) * 3;
                    targetPositions[i3] = textTargets[textIdx];
                    targetPositions[i3+1] = textTargets[textIdx+1];
                    targetPositions[i3+2] = textTargets[textIdx+2]; 

                    // Color Texto: Oro Neón Brillante
                    if (Math.random() < 0.9) mixedColor.setHSL(0.12, 1.0, 0.8);
                    else mixedColor.setHSL(0.10, 1.0, 0.95);
                }

                colors[i3] = mixedColor.r;
                colors[i3 + 1] = mixedColor.g;
                colors[i3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.5,
                vertexColors: true,
                map: createParticleTexture(),
                blending: THREE.AdditiveBlending,
                depthTest: false,
                transparent: true,
                opacity: 1.0
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const positions = particles.geometry.attributes.position.array;

            // --- FORMACIÓN MUCHO MÁS LENTA (Pedida) ---
            const formationSpeed = 0.005; 

            for (let i = 0; i < particleCount * 3; i++) {
                const distancia = targetPositions[i] - positions[i];
                positions[i] += distancia * formationSpeed;
            }

            particles.geometry.attributes.position.needsUpdate = true;

            // --- GIRO ESTABLE Y VERTICAL (Arreglado) ---
            particles.rotation.y += 0.0015; // Rotación solo sobre eje Y
            
            // Actualización de título eliminada

            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>

</html>
